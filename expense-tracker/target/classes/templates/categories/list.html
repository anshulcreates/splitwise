<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Categories')}"></head>
<body>
<div th:replace="~{layout :: toasts}"></div>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container-fluid px-4 py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <div>
            <h4 class="fw-bold mb-1">Categories</h4>
            <p class="text-muted mb-0 small">Manage your income and expense categories</p>
        </div>
        <a th:href="@{/categories/add}" class="btn btn-primary btn-sm px-3">
            <i class="bi bi-plus-circle me-1"></i>Add Category
        </a>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-pills mb-4" id="categoryTabs">
        <li class="nav-item">
            <button class="nav-link active" id="expenseTab" data-bs-toggle="pill" data-bs-target="#expensePane">
                <i class="bi bi-arrow-down-circle me-1"></i>Expense
                <span class="badge bg-danger ms-1" th:text="${#lists.size(expenseCategories)}">0</span>
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="incomeTab" data-bs-toggle="pill" data-bs-target="#incomePane">
                <i class="bi bi-arrow-up-circle me-1"></i>Income
                <span class="badge bg-success ms-1" th:text="${#lists.size(incomeCategories)}">0</span>
            </button>
        </li>
    </ul>

    <div class="tab-content">
        <!-- Expense categories -->
        <div class="tab-pane fade show active" id="expensePane">
            <div th:if="${#lists.isEmpty(expenseCategories)}" class="empty-state text-center py-5">
                <i class="bi bi-tags text-muted" style="font-size:3rem;opacity:.3;"></i>
                <h6 class="text-muted mt-3">No expense categories yet</h6>
                <a th:href="@{/categories/add}" class="btn btn-sm btn-primary mt-2">Add Category</a>
            </div>
            <div class="row g-3" th:unless="${#lists.isEmpty(expenseCategories)}">
                <div class="col-12 col-sm-6 col-md-4 col-lg-3" th:each="cat : ${expenseCategories}">
                    <div class="card border-0 shadow-sm h-100 budget-card">
                        <div class="card-body d-flex align-items-center gap-3 py-3">
                            <div class="cat-icon">
                                <i th:class="${cat.icon ?: 'bi bi-tag'}"></i>
                            </div>
                            <div class="flex-grow-1 min-w-0">
                                <p class="mb-0 fw-medium text-truncate" th:text="${cat.name}">Category</p>
                                <span class="badge bg-danger-subtle text-danger" style="font-size:.7rem;">Expense</span>
                            </div>
                            <div class="d-flex flex-column gap-1" th:unless="${cat.default}">
                                <a th:href="@{/categories/edit/{id}(id=${cat.id})}"
                                   class="btn btn-sm btn-outline-primary" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;" title="Edit">
                                    <i class="bi bi-pencil" style="font-size:.75rem;"></i>
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-outline-danger" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;" title="Delete"
                                        data-bs-toggle="modal" data-bs-target="#deleteCatModal"
                                        th:data-id="${cat.id}" th:data-name="${cat.name}"
                                        onclick="setCatDelete(this)">
                                    <i class="bi bi-trash" style="font-size:.75rem;"></i>
                                </button>
                            </div>
                            <div th:if="${cat.default}">
                                <span class="badge bg-light text-muted border" title="Default category — cannot be edited">Default</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Income categories -->
        <div class="tab-pane fade" id="incomePane">
            <div th:if="${#lists.isEmpty(incomeCategories)}" class="empty-state text-center py-5">
                <i class="bi bi-tags text-muted" style="font-size:3rem;opacity:.3;"></i>
                <h6 class="text-muted mt-3">No income categories yet</h6>
                <a th:href="@{/categories/add}" class="btn btn-sm btn-primary mt-2">Add Category</a>
            </div>
            <div class="row g-3" th:unless="${#lists.isEmpty(incomeCategories)}">
                <div class="col-12 col-sm-6 col-md-4 col-lg-3" th:each="cat : ${incomeCategories}">
                    <div class="card border-0 shadow-sm h-100 budget-card">
                        <div class="card-body d-flex align-items-center gap-3 py-3">
                            <div class="cat-icon" style="background:#D1FAE5;color:#10B981;">
                                <i th:class="${cat.icon ?: 'bi bi-tag'}"></i>
                            </div>
                            <div class="flex-grow-1 min-w-0">
                                <p class="mb-0 fw-medium text-truncate" th:text="${cat.name}">Category</p>
                                <span class="badge bg-success-subtle text-success" style="font-size:.7rem;">Income</span>
                            </div>
                            <div class="d-flex flex-column gap-1" th:unless="${cat.default}">
                                <a th:href="@{/categories/edit/{id}(id=${cat.id})}"
                                   class="btn btn-sm btn-outline-primary" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;" title="Edit">
                                    <i class="bi bi-pencil" style="font-size:.75rem;"></i>
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-outline-danger" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;" title="Delete"
                                        data-bs-toggle="modal" data-bs-target="#deleteCatModal"
                                        th:data-id="${cat.id}" th:data-name="${cat.name}"
                                        onclick="setCatDelete(this)">
                                    <i class="bi bi-trash" style="font-size:.75rem;"></i>
                                </button>
                            </div>
                            <div th:if="${cat.default}">
                                <span class="badge bg-light text-muted border" title="Default category — cannot be edited">Default</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteCatModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0">
                <h6 class="modal-title fw-semibold"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Delete Category</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-0">
                    Delete <strong id="catNameDisplay"></strong>? This cannot be undone.<br>
                    <span class="text-danger" style="font-size:.8rem;">Categories with transactions cannot be deleted.</span>
                </p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteCatForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
<script>
    function setCatDelete(btn) {
        document.getElementById('catNameDisplay').textContent = btn.dataset.name;
        document.getElementById('deleteCatForm').action = '/categories/delete/' + btn.dataset.id;
    }
</script>
</body>
</html>
