<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register')}"></head>
<body class="auth-page">

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
            <div class="text-center mb-4">
                <div class="brand-logo mb-3">
                    <i class="bi bi-wallet2 text-primary" style="font-size:2.5rem;"></i>
                </div>
                <h1 class="fw-bold text-dark fs-3">Create your account</h1>
                <p class="text-muted">Start tracking your finances today</p>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <form th:action="@{/register}" th:object="${registrationDto}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="text" th:field="*{fullName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="Your full name"/>
                            </div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-at"></i></span>
                                <input type="text" th:field="*{username}" class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="Choose a username"/>
                            </div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="your@email.com"/>
                            </div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Phone <span class="text-muted fw-normal">(optional)</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="tel" th:field="*{phone}" class="form-control" placeholder="+91 XXXXX XXXXX"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Min 6 chars, letters + numbers"/>
                                <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" th:field="*{confirmPassword}" class="form-control"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                       placeholder="Repeat your password"/>
                            </div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </button>
                    </form>

                    <hr class="my-4"/>
                    <p class="text-center text-muted mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="text-primary fw-medium text-decoration-none">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('togglePwd').addEventListener('click', function() {
        const pwd = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
        else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
    });
</script>
</body>
</html>
