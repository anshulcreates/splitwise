# Application
spring.application.name=expense-tracker
server.port=${PORT:8080}

# Database Configuration (H2 embedded)
spring.datasource.url=jdbc:h2:file:./data/expense_tracker;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize data.sql on startup
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Session
server.servlet.session.timeout=30m

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.college.expensetracker=INFO

# File upload (for receipt images)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
