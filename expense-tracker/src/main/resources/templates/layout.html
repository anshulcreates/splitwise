<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | SpendWise'">SpendWise</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <!-- Custom CSS -->
    <link href="/css/style.css" th:href="@{/css/style.css}" rel="stylesheet"/>
</head>

<body th:fragment="body-start">
</body>

<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color:#4F46E5;">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/dashboard}">
            <i class="bi bi-wallet2 me-2"></i>SpendWise
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/dashboard')} ? 'active' : ''">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transactions}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/transactions')} ? 'active' : ''">
                        <i class="bi bi-list-ul me-1"></i>Transactions
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/categories')} ? 'active' : ''">
                        <i class="bi bi-tags me-1"></i>Categories
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"
                       th:classappend="${currentUri != null and currentUri.startsWith('/reports')} ? 'active' : ''">
                        <i class="bi bi-bar-chart me-1"></i>Reports
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/reports/monthly}"><i class="bi bi-calendar-month me-2"></i>Monthly Report</a></li>
                        <li><a class="dropdown-item" th:href="@{/reports/yearly}"><i class="bi bi-calendar-year me-2"></i>Yearly Report</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/budgets}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/budgets')} ? 'active' : ''">
                        <i class="bi bi-piggy-bank me-1"></i>Budgets
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
                        <div class="avatar-circle">
                            <span th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">U</span>
                        </div>
                        <span th:text="${user.fullName}" class="d-none d-lg-inline">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Toast Notifications Fragment -->
<div th:fragment="toasts" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
    <div th:if="${successMessage}" id="successToast" class="toast align-items-center text-bg-success border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-medium">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
    <div th:if="${errorMessage}" id="errorToast" class="toast align-items-center text-bg-danger border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-medium">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span th:text="${errorMessage}"></span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Scripts Fragment -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/charts.js}"></script>
    <script>
        // Auto-dismiss toasts after 4s
        document.querySelectorAll('.toast').forEach(function(el) {
            setTimeout(function() {
                var toast = bootstrap.Toast.getOrCreateInstance(el);
                toast.hide();
            }, 4000);
        });
    </script>
</div>
</html>
